name: Deploy Frontend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build React frontend ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── 3. Set up SSH ─────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Copy dist to EC2 ───────────────────────────────────────────────
      - name: Copy frontend build to EC2
        run: |
          scp -i ~/.ssh/deploy_key -r ./dist ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/ubuntu/app/frontend/

      # ── 5. Reload Nginx ───────────────────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash -s << EOF
            sudo systemctl reload nginx
          EOF